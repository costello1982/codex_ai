{% extends "base.html" %}
{% block title %}New Subnet · IPAM{% endblock %}
{% block content %}
<section class="panel">
  <header class="panel-header">
    <div>
      <h2>Create a subnet</h2>
      <p class="muted">Store a network in CIDR notation. Example: 10.0.0.0/24</p>
    </div>
  </header>
  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}
  <form action="/subnets" method="post" class="form">
    <label for="cidr">CIDR</label>
    <input type="text" id="cidr" name="cidr" placeholder="192.168.1.0/24" value="{{ cidr }}" required />

    <label for="description">Description</label>
    <input type="text" id="description" name="description" placeholder="Office LAN" value="{{ description }}" />

    <button type="submit" class="button">Create subnet</button>
  </form>
</section>
{% endblock %}
